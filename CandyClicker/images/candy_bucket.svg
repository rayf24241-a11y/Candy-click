<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <!-- Rust texture gradient -->
    <radialGradient id="rustGrad1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c44a1a"/>
      <stop offset="40%" stop-color="#a33510"/>
      <stop offset="100%" stop-color="#7a2008"/>
    </radialGradient>
    <radialGradient id="rustGrad2" cx="65%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b84015"/>
      <stop offset="100%" stop-color="#6b1c06"/>
    </radialGradient>
    <linearGradient id="bucketShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#fff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a7060"/>
      <stop offset="50%" stop-color="#6a5040"/>
      <stop offset="100%" stop-color="#4a3020"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a6050"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <filter id="rust" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="3" in="noise" result="colorNoise"/>
      <feBlend in="SourceGraphic" in2="colorNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="dent">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="bucketClip">
      <polygon points="38,55 162,55 148,185 52,185"/>
    </clipPath>
  </defs>

  <!-- ===== HANDLE ===== -->
  <path d="M 68 48 Q 100 18 132 48" stroke="url(#handleGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Handle hooks/rings -->
  <circle cx="68" cy="50" r="6" fill="#5a4030" stroke="#3a2010" stroke-width="1.5"/>
  <circle cx="132" cy="50" r="6" fill="#5a4030" stroke="#3a2010" stroke-width="1.5"/>
  <!-- rust on handle -->
  <path d="M 78 34 Q 100 22 122 34" stroke="#8a3010" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- ===== BUCKET BODY (trapezoid) ===== -->
  <polygon points="38,55 162,55 148,185 52,185" fill="url(#rustGrad1)"/>

  <!-- Main rust variation patches -->
  <ellipse cx="80" cy="100" rx="28" ry="22" fill="#7a2008" opacity="0.5" clip-path="url(#bucketClip)"/>
  <ellipse cx="140" cy="130" rx="20" ry="30" fill="#6b1c06" opacity="0.6" clip-path="url(#bucketClip)"/>
  <ellipse cx="100" cy="155" rx="35" ry="18" fill="#8a2a0a" opacity="0.4" clip-path="url(#bucketClip)"/>
  <!-- Orange highlights (less rusted areas) -->
  <ellipse cx="115" cy="85" rx="18" ry="25" fill="#d05a20" opacity="0.45" clip-path="url(#bucketClip)"/>

  <!-- Dent marks -->
  <ellipse cx="72" cy="120" rx="9" ry="5" fill="#5a1a04" opacity="0.7" transform="rotate(-15,72,120)" clip-path="url(#bucketClip)"/>
  <ellipse cx="138" cy="95" rx="7" ry="4" fill="#5a1a04" opacity="0.6" transform="rotate(10,138,95)" clip-path="url(#bucketClip)"/>
  <ellipse cx="95" cy="170" rx="12" ry="4" fill="#5a1a04" opacity="0.5" transform="rotate(-5,95,170)" clip-path="url(#bucketClip)"/>

  <!-- Rust streaks dripping down -->
  <line x1="70" y1="65" x2="64" y2="130" stroke="#5a1a04" stroke-width="2" opacity="0.5" clip-path="url(#bucketClip)"/>
  <line x1="110" y1="60" x2="108" y2="145" stroke="#6a1e06" stroke-width="1.5" opacity="0.4" clip-path="url(#bucketClip)"/>
  <line x1="145" y1="65" x2="142" y2="150" stroke="#5a1a04" stroke-width="2" opacity="0.45" clip-path="url(#bucketClip)"/>
  <!-- Small rust fleck dots -->
  <circle cx="85" cy="140" r="3" fill="#3a1004" opacity="0.6" clip-path="url(#bucketClip)"/>
  <circle cx="125" cy="160" r="2.5" fill="#3a1004" opacity="0.55" clip-path="url(#bucketClip)"/>
  <circle cx="60" cy="95" r="2" fill="#3a1004" opacity="0.5" clip-path="url(#bucketClip)"/>
  <circle cx="148" cy="145" r="3" fill="#3a1004" opacity="0.6" clip-path="url(#bucketClip)"/>

  <!-- Shine/shadow overlay -->
  <polygon points="38,55 162,55 148,185 52,185" fill="url(#bucketShine)"/>

  <!-- ===== TOP RIM ===== -->
  <rect x="33" y="50" width="134" height="12" rx="3" fill="url(#rimGrad)"/>
  <!-- Rim rust spots -->
  <rect x="50" y="51" width="18" height="5" rx="2" fill="#7a3010" opacity="0.5"/>
  <rect x="115" y="53" width="14" height="4" rx="2" fill="#7a3010" opacity="0.45"/>
  <!-- Rim shine -->
  <rect x="33" y="50" width="134" height="4" rx="3" fill="#fff" opacity="0.07"/>

  <!-- ===== BOTTOM RIM ===== -->
  <rect x="47" y="181" width="106" height="10" rx="3" fill="url(#rimGrad)"/>
  <rect x="47" y="181" width="106" height="3" rx="3" fill="#fff" opacity="0.05"/>

  <!-- ===== CANDY INSIDE (visible at top of bucket) ===== -->
  <!-- Orange candy corn -->
  <ellipse cx="72" cy="57" rx="7" ry="5" fill="#ff8800"/>
  <ellipse cx="72" cy="57" rx="7" ry="3" fill="#ffaa00" opacity="0.7"/>
  <!-- Pink candy -->
  <ellipse cx="95" cy="55" rx="8" ry="5" fill="#ff4488"/>
  <ellipse cx="95" cy="55" rx="8" ry="3" fill="#ff88bb" opacity="0.7"/>
  <!-- Purple candy -->
  <ellipse cx="118" cy="56" rx="6" ry="4" fill="#9933cc"/>
  <ellipse cx="118" cy="56" rx="6" ry="2.5" fill="#cc77ff" opacity="0.6"/>
  <!-- Yellow candy -->
  <ellipse cx="140" cy="57" rx="7" ry="5" fill="#ffcc00"/>
  <ellipse cx="140" cy="57" rx="7" ry="3" fill="#ffee66" opacity="0.7"/>
  <!-- Red candy -->
  <ellipse cx="58" cy="58" rx="5" ry="4" fill="#ee2222"/>
  <!-- Green candy -->
  <ellipse cx="130" cy="55" rx="5" ry="3" fill="#22bb44"/>
  <ellipse cx="107" cy="57" rx="5" ry="3" fill="#ff6600"/>

  <!-- ===== SCRATCHES / TEXTURE ===== -->
  <line x1="55" y1="70" x2="60" y2="90" stroke="#3a1004" stroke-width="1" opacity="0.35" clip-path="url(#bucketClip)"/>
  <line x1="90" y1="110" x2="86" y2="135" stroke="#2a0e02" stroke-width="1" opacity="0.3" clip-path="url(#bucketClip)"/>
  <line x1="130" y1="75" x2="135" y2="100" stroke="#3a1004" stroke-width="1" opacity="0.3" clip-path="url(#bucketClip)"/>
  <line x1="105" y1="140" x2="100" y2="175" stroke="#2a0e02" stroke-width="0.8" opacity="0.25" clip-path="url(#bucketClip)"/>

  <!-- Subtle label area (worn off sticker) -->
  <rect x="65" y="100" width="70" height="40" rx="4" fill="#b84015" opacity="0.2" clip-path="url(#bucketClip)"/>
  <rect x="65" y="100" width="70" height="40" rx="4" fill="none" stroke="#4a1008" stroke-width="1" opacity="0.25" clip-path="url(#bucketClip)"/>
</svg>
